<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V3预测系统 - 优化版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .risk-high { color: #dc3545; font-weight: bold; }
        .risk-medium { color: #ffc107; font-weight: bold; }
        .risk-low { color: #28a745; font-weight: bold; }
        .fire-3 { color: #ff6b6b; font-weight: bold; }
        .fire-2 { color: #ffa500; font-weight: bold; }
        .warning-badge { 
            background-color: #dc3545; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.9em;
        }
        .leverge-warning {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">V3预测系统 - 优化版 🔥</h1>
        <p class="text-center text-muted">新增：杠杆率预警系统 | 双机构一致性评级 | 完整5分组/7层级分析</p>
        
        <!-- 赔率输入 -->
        <div class="card mb-4">
            <div class="card-header">
                <h5>赔率输入</h5>
            </div>
            <div class="card-body">
                <form id="oddsForm">
                    <div class="row">
                        <div class="col-md-6">
                            <h6>Bet365</h6>
                            <div class="row mb-3">
                                <div class="col">
                                    <label>初盘-主胜</label>
                                    <input type="number" class="form-control" id="b365_home_open" step="0.01" value="1.67">
                                </div>
                                <div class="col">
                                    <label>初盘-平赔</label>
                                    <input type="number" class="form-control" id="b365_draw_open" step="0.01" value="3.70">
                                </div>
                                <div class="col">
                                    <label>初盘-客胜</label>
                                    <input type="number" class="form-control" id="b365_away_open" step="0.01" value="5.00">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label>临场-主胜</label>
                                    <input type="number" class="form-control" id="b365_home_close" step="0.01" value="1.44">
                                </div>
                                <div class="col">
                                    <label>临场-平赔</label>
                                    <input type="number" class="form-control" id="b365_draw_close" step="0.01" value="4.33">
                                </div>
                                <div class="col">
                                    <label>临场-客胜</label>
                                    <input type="number" class="form-control" id="b365_away_close" step="0.01" value="7.50">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6>William Hill</h6>
                            <div class="row mb-3">
                                <div class="col">
                                    <label>初盘-主胜</label>
                                    <input type="number" class="form-control" id="wh_home_open" step="0.01" value="1.55">
                                </div>
                                <div class="col">
                                    <label>初盘-平赔</label>
                                    <input type="number" class="form-control" id="wh_draw_open" step="0.01" value="3.80">
                                </div>
                                <div class="col">
                                    <label>初盘-客胜</label>
                                    <input type="number" class="form-control" id="wh_away_open" step="0.01" value="5.50">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label>临场-主胜</label>
                                    <input type="number" class="form-control" id="wh_home_close" step="0.01" value="1.44">
                                </div>
                                <div class="col">
                                    <label>临场-平赔</label>
                                    <input type="number" class="form-control" id="wh_draw_close" step="0.01" value="4.20">
                                </div>
                                <div class="col">
                                    <label>临场-客胜</label>
                                    <input type="number" class="form-control" id="wh_away_close" step="0.01" value="7.00">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <h6>大小球</h6>
                            <div class="row">
                                <div class="col">
                                    <label>初盘盘口</label>
                                    <input type="number" class="form-control" id="ou_open" step="0.25" value="2.5">
                                </div>
                                <div class="col">
                                    <label>临场盘口</label>
                                    <input type="number" class="form-control" id="ou_close" step="0.25" value="2.5">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg">开始预测</button>
                </form>
            </div>
        </div>
        
        <!-- 结果显示 -->
        <div id="resultSection" style="display: none;">
            <!-- 风险评估 -->
            <div class="card mb-4" id="riskCard">
                <div class="card-header bg-warning">
                    <h5>⚠️ 风险评估（新增）</h5>
                </div>
                <div class="card-body" id="riskBody">
                </div>
            </div>
            
            <!-- 最终预测 -->
            <div class="card mb-4">
                <div class="card-header bg-success text-white">
                    <h5>🎯 最终预测</h5>
                </div>
                <div class="card-body" id="finalBody">
                </div>
            </div>
            
            <!-- 步骤1 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5>步骤1：初盘+临场完全匹配</h5>
                </div>
                <div class="card-body" id="step1Body">
                </div>
            </div>
            
            <!-- 步骤2 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5>步骤2：相似度分析（5分组）</h5>
                </div>
                <div class="card-body" id="step2Body">
                </div>
            </div>
            
            <!-- 步骤4 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5>步骤4：杠杆率分析</h5>
                </div>
                <div class="card-body" id="step4Body">
                </div>
            </div>
            
            <!-- 步骤6 -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5>步骤6：爆冷规律分析</h5>
                </div>
                <div class="card-body" id="step6Body">
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('oddsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                b365_home_open: document.getElementById('b365_home_open').value,
                b365_draw_open: document.getElementById('b365_draw_open').value,
                b365_away_open: document.getElementById('b365_away_open').value,
                b365_home_close: document.getElementById('b365_home_close').value,
                b365_draw_close: document.getElementById('b365_draw_close').value,
                b365_away_close: document.getElementById('b365_away_close').value,
                wh_home_open: document.getElementById('wh_home_open').value,
                wh_draw_open: document.getElementById('wh_draw_open').value,
                wh_away_open: document.getElementById('wh_away_open').value,
                wh_home_close: document.getElementById('wh_home_close').value,
                wh_draw_close: document.getElementById('wh_draw_close').value,
                wh_away_close: document.getElementById('wh_away_close').value,
                ou_open: document.getElementById('ou_open').value,
                ou_close: document.getElementById('ou_close').value
            };
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    displayResult(result.result);
                } else {
                    alert('预测失败: ' + result.error);
                }
            } catch (error) {
                alert('请求失败: ' + error);
            }
        });
        
        function displayResult(data) {
            document.getElementById('resultSection').style.display = 'block';
            
            // 风险评估
            displayRisk(data.risk_assessment);
            
            // 最终预测
            displayFinal(data.final);
            
            // 步骤1
            displayStep1(data.step1);
            
            // 步骤2
            displayStep2(data.step2);
            
            // 步骤4
            displayStep4(data.step4);
            
            // 步骤6
            displayStep6(data.step6);
        }
        
        function displayRisk(risk) {
            let html = '<div class="row">';
            html += '<div class="col-md-6">';
            html += `<h6>杠杆率</h6>`;
            html += `<p>B365杠杆率: <strong>${risk.b365_leverage.toFixed(2)}</strong>`;
            if (risk.b365_leverage >= 3.0) {
                html += ` <span class="warning-badge">高风险</span>`;
            }
            html += `</p>`;
            html += `<p>WH杠杆率: <strong>${risk.wh_leverage.toFixed(2)}</strong>`;
            if (risk.wh_leverage >= 3.0) {
                html += ` <span class="warning-badge">高风险</span>`;
            }
            html += `</p>`;
            html += `<p>杠杆率差异: ${risk.leverage_diff.toFixed(2)}</p>`;
            html += '</div>';
            
            html += '<div class="col-md-6">';
            html += `<h6>双机构一致性</h6>`;
            html += `<p>临场主胜差异: ${risk.home_odds_diff.toFixed(2)}</p>`;
            html += `<p>一致性评级: <strong>${risk.consistency_rating}</strong></p>`;
            html += `<p>风险级别: <strong class="risk-${risk.risk_level}">${risk.risk_level.toUpperCase()}</strong></p>`;
            html += '</div>';
            html += '</div>';
            
            if (risk.warnings.length > 0) {
                html += '<div class="leverge-warning mt-3">';
                html += '<h6>⚠️ 预警信息</h6>';
                for (const w of risk.warnings) {
                    html += `<p class="risk-${w.severity}">• ${w.message}</p>`;
                }
                html += '</div>';
            }
            
            document.getElementById('riskBody').innerHTML = html;
            
            // 更新卡片颜色
            const riskCard = document.getElementById('riskCard');
            if (risk.risk_level === 'high') {
                riskCard.querySelector('.card-header').className = 'card-header bg-danger text-white';
            } else if (risk.risk_level === 'medium') {
                riskCard.querySelector('.card-header').className = 'card-header bg-warning';
            } else {
                riskCard.querySelector('.card-header').className = 'card-header bg-success text-white';
            }
        }
        
        function displayFinal(final) {
            let html = '<div class="row">';
            html += '<div class="col-md-6">';
            html += `<h3>预测结果: <span class="text-success">${final.prediction}</span></h3>`;
            html += `<p>置信度: <strong>${final.confidence.toFixed(1)}%</strong>`;
            if (final.confidence_adjustment !== 0) {
                html += ` <small class="text-muted">(原${final.original_confidence.toFixed(1)}%，调整${final.confidence_adjustment}%)</small>`;
            }
            html += `</p>`;
            html += `<p>主胜率: ${final.home_pct.toFixed(1)}%</p>`;
            html += `<p>平局率: ${final.draw_pct.toFixed(1)}%</p>`;
            html += `<p>客胜率: ${final.away_pct.toFixed(1)}%</p>`;
            html += '</div>';
            
            html += '<div class="col-md-6">';
            html += `<h6>大小球分析</h6>`;
            html += `<p>大2.5球概率: ${final.over_25_pct.toFixed(1)}%</p>`;
            html += `<p>平均总进球: ${final.avg_total_goals.toFixed(2)}球</p>`;
            html += `<p>平均净胜球: ${final.avg_margin.toFixed(2)}球</p>`;
            html += `<p>样本量: ${final.total_matches}场</p>`;
            html += '</div>';
            html += '</div>';
            
            html += '<div class="row mt-3">';
            html += '<div class="col">';
            html += `<h6>推荐比分</h6>`;
            html += '<table class="table table-sm">';
            html += '<tr><th>比分</th><th>场次</th></tr>';
            for (const s of final.top_scores) {
                html += `<tr><td>${s.home}-${s.away}</td><td>${s.count}场</td></tr>`;
            }
            html += '</table>';
            html += '</div>';
            
            html += '<div class="col">';
            html += `<h6>进球分布</h6>`;
            html += '<table class="table table-sm">';
            html += '<tr><th>总进球</th><th>场次</th></tr>';
            for (const g of final.goals_dist) {
                html += `<tr><td>${g.goals}球</td><td>${g.count}场</td></tr>`;
            }
            html += '</table>';
            html += '</div>';
            html += '</div>';
            
            document.getElementById('finalBody').innerHTML = html;
        }
        
        function displayStep1(step1) {
            let html = '<table class="table">';
            html += '<tr><th>层级</th><th>样本量</th><th>主胜率</th><th>平局率</th><th>客胜率</th><th>平均净胜球</th><th>净胜球分布</th></tr>';
            for (const layer of step1.layers) {
                html += `<tr>`;
                html += `<td>${layer.name}</td>`;
                html += `<td><strong>${layer.total}</strong>场</td>`;
                html += `<td><strong class="text-success">${layer.home_pct.toFixed(1)}%</strong></td>`;
                html += `<td>${layer.draw_pct.toFixed(1)}%</td>`;
                html += `<td>${layer.away_pct.toFixed(1)}%</td>`;
                html += `<td>${layer.avg_margin.toFixed(2)}</td>`;
                html += `<td>赢1球${layer.win_1_pct.toFixed(1)}% / 赢2球${layer.win_2_pct.toFixed(1)}% / 赢3+球${layer.win_3plus_pct.toFixed(1)}%</td>`;
                html += `</tr>`;
            }
            html += '</table>';
            document.getElementById('step1Body').innerHTML = html;
        }
        
        function displayStep2(step2) {
            let html = '<table class="table">';
            html += '<tr><th>分组</th><th>样本量</th><th>主胜率</th><th>平局率</th><th>客胜率</th></tr>';
            for (const group of step2.groups) {
                html += `<tr>`;
                html += `<td>${group.name}</td>`;
                html += `<td><strong>${group.total}</strong>场</td>`;
                html += `<td><strong class="text-success">${group.home_pct.toFixed(1)}%</strong></td>`;
                html += `<td>${group.draw_pct.toFixed(1)}%</td>`;
                html += `<td>${group.away_pct.toFixed(1)}%</td>`;
                html += `</tr>`;
            }
            html += '</table>';
            document.getElementById('step2Body').innerHTML = html;
        }
        
        function displayStep4(step4) {
            let html = `<p><strong>目标杠杆率</strong>: B365 ${step4.b365_target.toFixed(2)} | WH ${step4.wh_target.toFixed(2)}</p>`;
            
            html += '<div class="row">';
            html += '<div class="col-md-6">';
            html += '<h6>B365杠杆率分层</h6>';
            html += '<table class="table table-sm">';
            html += '<tr><th>层级</th><th>范围</th><th>样本</th><th>主胜率</th></tr>';
            for (const layer of step4.b365_layers) {
                html += `<tr>`;
                html += `<td>${layer.name}</td>`;
                html += `<td>${layer.leverage_range}</td>`;
                html += `<td>${layer.total}场</td>`;
                html += `<td>${layer.home_pct.toFixed(1)}%</td>`;
                html += `</tr>`;
            }
            html += '</table>';
            html += '</div>';
            
            html += '<div class="col-md-6">';
            html += '<h6>WH杠杆率分层</h6>';
            html += '<table class="table table-sm">';
            html += '<tr><th>层级</th><th>范围</th><th>样本</th><th>主胜率</th></tr>';
            for (const layer of step4.wh_layers) {
                html += `<tr>`;
                html += `<td>${layer.name}</td>`;
                html += `<td>${layer.leverage_range}</td>`;
                html += `<td>${layer.total}场</td>`;
                html += `<td>${layer.home_pct.toFixed(1)}%</td>`;
                html += `</tr>`;
            }
            html += '</table>';
            html += '</div>';
            html += '</div>';
            
            document.getElementById('step4Body').innerHTML = html;
        }
        
        function displayStep6(step6) {
            let html = `<p><strong>基础样本</strong>: ${step6.base_sample.total}场 (主胜${step6.min_odds.toFixed(2)}±0.03)</p>`;
            html += `<p>主胜率: ${step6.base_sample.home_pct.toFixed(1)}% | 爆冷率: <strong class="text-warning">${step6.base_sample.upset_pct.toFixed(1)}%</strong></p>`;
            
            html += '<div class="row">';
            html += '<div class="col-md-6">';
            html += '<h6>平赔高发TOP 5</h6>';
            html += '<table class="table table-sm">';
            html += '<tr><th>平赔</th><th>平局场次</th></tr>';
            for (const h of step6.draw_hotspots.slice(0, 5)) {
                const isCurrent = Math.abs(h.draw_odds - step6.current_risk.current_draw) < 0.25;
                html += `<tr>`;
                html += `<td>${h.draw_odds.toFixed(2)} ${isCurrent ? '<span class="warning-badge">当前</span>' : ''}</td>`;
                html += `<td>${h.count}场</td>`;
                html += `</tr>`;
            }
            html += '</table>';
            html += '</div>';
            
            html += '<div class="col-md-6">';
            html += '<h6>客胜高发TOP 5</h6>';
            html += '<table class="table table-sm">';
            html += '<tr><th>客胜</th><th>客胜场次</th></tr>';
            for (const h of step6.away_hotspots.slice(0, 5)) {
                const isCurrent = Math.abs(h.away_odds - step6.current_risk.current_away) < 0.50;
                html += `<tr>`;
                html += `<td>${h.away_odds.toFixed(2)} ${isCurrent ? '<span class="warning-badge">当前</span>' : ''}</td>`;
                html += `<td>${h.count}场</td>`;
                html += `</tr>`;
            }
            html += '</table>';
            html += '</div>';
            html += '</div>';
            
            if (step6.current_risk.draw_in_hotspot || step6.current_risk.away_in_hotspot) {
                html += '<div class="leverge-warning">';
                html += '<h6>⚠️ 爆冷风险提示</h6>';
                if (step6.current_risk.draw_in_hotspot) {
                    html += `<p>当前平赔${step6.current_risk.current_draw.toFixed(2)}在高发范围内，平局风险较高</p>`;
                }
                if (step6.current_risk.away_in_hotspot) {
                    html += `<p>当前客胜${step6.current_risk.current_away.toFixed(2)}在高发范围内，客胜风险较高</p>`;
                }
                html += '</div>';
            }
            
            document.getElementById('step6Body').innerHTML = html;
        }
    </script>
</body>
</html>
